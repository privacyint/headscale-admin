name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-check:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npx svelte-kit sync
      - run: npx svelte-check --tsconfig ./tsconfig.json

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npx vitest run

  build:
    name: Build (static)
    runs-on: ubuntu-latest
    needs: [lint-and-check, test]
    strategy:
      matrix:
        endpoint: ['', '/admin']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Build with ENDPOINT=${{ matrix.endpoint }}
        env:
          ENDPOINT: ${{ matrix.endpoint }}
        run: npx vite build
      - name: Verify pre-rendered routes exist
        run: |
          for route in index.html settings/index.html nodes/index.html users/index.html; do
            path="build/${{ matrix.endpoint }}${route}"
            # strip leading slash if ENDPOINT is empty
            path="${path#/}"
            test -f "$path" || { echo "MISSING: $path"; exit 1; }
            echo "OK: $path"
          done
      - name: Verify SPA fallback exists
        run: |
          fallback="build/${{ matrix.endpoint }}200.html"
          fallback="${fallback#/}"
          test -f "$fallback" || { echo "MISSING: $fallback"; exit 1; }
          echo "OK: $fallback"

  docker-build:
    name: Docker build (smoke test)
    runs-on: ubuntu-latest
    needs: [lint-and-check, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t headscale-admin:ci .
      - name: Verify Caddy serves routes
        run: |
          docker run -d --name ha-ci -p 8080:80 headscale-admin:ci
          sleep 2
          for path in /admin/ /admin/nodes/ /admin/settings/ /admin/users/; do
            status=$(curl -s -o /dev/null -w '%{http_code}' "http://localhost:8080${path}")
            if [ "$status" != "200" ]; then
              echo "FAIL: $path returned $status"
              docker logs ha-ci
              exit 1
            fi
            echo "OK: $path → $status"
          done
          docker rm -f ha-ci
